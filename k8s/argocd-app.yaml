apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: unified-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aakashhh2001/Cloud-Native-GitOps-Platform-on-AWS-EKS-with-Istio-ArgoCD.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true