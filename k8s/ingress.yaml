apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alb-istio-ingress
  namespace: istio-system # Must sit where Istio Gateway Service is
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: istio-ingress
                port:
                  number: 80