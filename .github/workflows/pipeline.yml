name: CI/CD Pipeline
on:
  push:
    branches: [ "main" ]
    # paths: [ "app/**" ] # Temporarily disabled so this run triggers on your commit

permissions:
  id-token: write
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. AWS Login (OIDC) - Using v4 to avoid Node 20 deprecation
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::867958227684:role/GitHubActions-Deploy-Role
          aws-region: us-east-1

      # 2. Get Docker Hub Password from AWS Secrets Manager
      - name: Get Secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        id: dockerhub
        with:
          secret-ids: |
            dockerhub-credentials
          parse-json-secrets: true

      # 3. Docker Build & Push (Using aakashh2001 for Docker Hub)
      - name: Login to Docker Hub
        run: echo "$DOCKERHUB_CREDENTIALS_PASSWORD" | docker login -u "$DOCKERHUB_CREDENTIALS_USERNAME" --password-stdin

      - name: Build Image
        run: |
          TAG=$(echo $GITHUB_SHA | cut -c1-7)
          docker build ./app -t aakashh2001/python-app:$TAG
          docker push aakashh2001/python-app:$TAG
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      # 4. GitOps Update (Using aakashhh2001 for GitHub Config)
      - name: Update Manifest
        run: |
          # Foolproof sed: Matches ANY username before /python-app and forces the correct one
          sed -i "s|image: .*/python-app:.*|image: aakashh2001/python-app:${{ env.IMAGE_TAG }}|g" k8s/deployment.yaml
          
          git config user.name "aakashhh2001"
          git config user.email "actions@github.com"
          
          git add k8s/deployment.yaml
          
          # Smart commit: Only commits if sed actually changed something
          if ! git diff --staged --quiet; then
            git commit -m "Update image to ${{ env.IMAGE_TAG }}"
            git push
          else
            echo "No changes to commit. Manifest is already up to date."
          fi
          
      # 5. Email Notification
      - name: Send SES Email
        run: |
          aws ses send-email \
            --from "ramanan11032026@gmail.com" \
            --destination "ToAddresses=ramanan11032026@gmail.com" \
            --message file://<(echo '{"Subject": {"Data": "Deployment Success"}, "Body": {"Text": {"Data": "New version ${{ env.IMAGE_TAG }} deployed via ArgoCD."}}}')
