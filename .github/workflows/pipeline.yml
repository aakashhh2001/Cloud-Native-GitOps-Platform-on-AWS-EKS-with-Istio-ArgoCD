name: CI/CD Pipeline
on:
  push:
    branches: [ "main" ]
    paths: [ "app/**" ] # Only runs if app changes

permissions:
  id-token: write
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. AWS Login (OIDC)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::867958227684:role/GitHubActions-Deploy-Role
          aws-region: us-east-1

      # 2. Get Docker Hub Password
      - name: Get Secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        id: dockerhub
        with:
          secret-id: dockerhub-credentials
          parse-json-secrets: true

      # 3. Docker Build & Push
      - name: Login to Docker Hub
        run: docker login -u ${{ steps.dockerhub.outputs.username }} -p ${{ steps.dockerhub.outputs.password }}
      
      - name: Build Image
        run: |
          TAG=$(echo $GITHUB_SHA | cut -c1-7)
          docker build ./app -t aakashh2001/python-app:$TAG
          docker push aakashh2001/python-app:$TAG
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      # 4. GitOps Update
      - name: Update Manifest
        run: |
          sed -i "s|image: aakashh2001/python-app:.*|image: aakashh2001/python-app:${{ env.IMAGE_TAG }}|g" k8s/deployment.yaml
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image to ${{ env.IMAGE_TAG }}"
          git push

      # 5. Email Notification
      - name: Send SES Email
        run: |
          aws ses send-email \
            --from "ramanan11032026@gmail.com" \
            --destination "ToAddresses=ramanan11032026@gmail.com" \
            --message file://<(echo '{"Subject": {"Data": "Deployment Success"}, "Body": {"Text": {"Data": "New version ${{ env.IMAGE_TAG }} deployed via ArgoCD."}}}')
